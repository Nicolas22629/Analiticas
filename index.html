<!DOCTYPE html>
<html lang="es-419">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nico Hacker - Dashboard</title>

    <!-- Librería Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>


<body>


<div class="dashboard-container">


    <!-- ==========================
         HEADER
    =========================== -->

    <header class="header-controls">


        <div class="logo-container">

            <div class="logo-icon">
                📊
            </div>


            <div class="logo-text">

                <span class="main">
                    Nico Hacker
                </span>

                <span class="sub">
                    Dashboard
                </span>

            </div>


        </div>



        <div class="filters-group">


            <select 
                id="filter-datasource"
                class="select-filter">

                <option>
                    Origen de datos combinado
                </option>

            </select>



            <select 
                id="filter-account"
                class="select-filter">

                <option>
                    Cuenta combinada
                </option>

            </select>




            <div class="filter-date-wrapper">


                <input 
                    type="date"
                    id="fecha-inicio"
                    class="date-input">


                <span>
                    →
                </span>


                <input 
                    type="date"
                    id="fecha-fin"
                    class="date-input">



                <button 
                    id="aplicar-fechas"
                    class="btn-aplicar-fechas">

                    Aplicar

                </button>


            </div>





            <button
                id="btn-actualizar-sheets"
                class="btn-actualizar-sheets">

                🔄 Google Sheets

            </button>




            <button
                id="btn-cargar-datos"
                class="btn-cargar-datos">

                📂 Cargar Datos

            </button>



        </div>


    </header>






    <!-- ==========================
         KPIs
    =========================== -->


    <section 
        id="kpi-container"
        class="kpi-grid">

    </section>








    <!-- ==========================
         TABLA
    =========================== -->


    <section class="table-section">


        <table class="performance-table">


            <thead>

                <tr>

                    <th>
                        Plataforma
                    </th>


                    <th>
                        Seguidores totales
                    </th>


                    <th>
                        Nuevos seguidores
                    </th>


                    <th>
                        Compartidos
                    </th>


                    <th>
                        Impresiones
                    </th>


                </tr>


            </thead>



            <tbody id="table-body">


            </tbody>



        </table>


    </section>






</div>







<!-- ==========================
     MODAL CARGA ARCHIVOS
=========================== -->


<div 
class="modal-overlay"
id="modal-cargar-datos">



<div class="modal-content">



<h2>
📂 Cargar Datos
</h2>




<div 
id="drop-zone"
class="drop-zone">


<p>
Arrastra un archivo aquí
</p>


<p>
o haz clic para seleccionar
</p>


</div>



<input
type="file"
id="file-input"
accept=".csv,.xlsx,.xls"
hidden>




<div 
id="preview-container"
class="preview-container">


<table class="preview-table">

<thead id="preview-head"></thead>

<tbody id="preview-body"></tbody>


</table>


</div>




<div class="modal-actions">


<button
id="modal-cancel"
class="btn-modal-secondary">

Cancelar

</button>



<button
id="modal-apply"
class="btn-modal-primary"
disabled>

Aplicar

</button>



</div>



</div>


</div>








<!-- ==========================
     JAVASCRIPT MODULAR
=========================== -->


<script src="js/config.js"></script>

<script src="js/utils.js"></script>

<script src="js/parser.js"></script>


<script src="js/dataLoader.js"></script>

<script src="js/dataProcessor.js"></script>


<script src="js/googleSheets.js"></script>


<script src="js/renderer.js"></script>

<script src="js/filters.js"></script>


<script src="js/modal.js"></script>

<script src="js/events.js"></script>


<script src="js/app.js"></script>




</body>

</html>
